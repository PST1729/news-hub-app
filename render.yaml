services:
  - type: web
    name: news-api-backend
    runtime: node
    rootDir: news-api-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEWS_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: ALLOWED_ORIGINS
        sync: false
